# CommDetect — Great TV profile
#
# Great TV airs 4:3 content pillarboxed in a 16:9 frame (dark side bars during
# program content). During commercial breaks, letterbox bars are ALSO added
# (all four borders go dark). The logo disappears during commercial breaks.
#
# Letterbox detector is the primary signal: it samples the center-top strip of
# the frame, which is dark only when the top letterbox bar appears (i.e. during
# commercial breaks). BF clustering provides a corroborating signal.
#
# Logo detection via corner SSIM does not work: the logo sits inside the active
# 4:3 picture where background content changes continuously, making SSIM
# unstable regardless of crop size or position.

[Letterbox]
enabled=true
weight=0.55
# 5s minimum filters scene-cut flashes; all commercial breaks are 30s+.
min_duration=5.0
# 0.95 requires near-total darkness in the center-top strip. Genuine letterbox
# bars are solid black (~100% dark pixels). Dark nighttime scenes still have
# lighter elements (moon, ambient light, faces) that drop below this threshold,
# preventing false positives from dark program content.
pic_threshold=0.95

[BlackFrame]
weight=0.25
use_clustering=true
cluster_max_gap=350
cluster_min_duration=60
cluster_min_events=2

[SceneChange]
weight=0.05

[Silence]
weight=0.15

[Logo]
enabled=false

[AspectRatio]
weight=0.05

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
