# CommDetect — CBS profile
#
# For CBS network recordings where:
#   - A translucent white CBS eye appears in the lower-left corner during
#     program content and disappears during commercial breaks.
#   - CBS/Paramount+ branded breaks use a combined logo (different from the
#     pure CBS eye template), so SSIM correctly scores them as logo-absent.
#   - Commercial breaks are typically 2.5–3 minutes (143–180s).
#   - Modern production style: black frame at break entry, very quick exit
#     transition — BF clustering is a supporting signal, not the primary driver.
#
# Logo detection carries this profile. BF and silence provide supplemental support.

[BlackFrame]
# Reduced weight — Ghosts-style shows have in-program scene fades that form
# spurious BF clusters. At 0.15, a false BF cluster with logo present scores
# ~0.33 (below threshold). Logo carries detection; BF supports at boundaries.
weight=0.15
use_clustering=true
# 180s captures entry/exit BF events within a ~143s break while staying well
# under the ~1000s program segment separating breaks.
cluster_max_gap=180
cluster_min_duration=30
cluster_min_events=2

[SceneChange]
weight=0.10

[Silence]
weight=0.20

[Logo]
enabled=true
# Logo is the primary detection signal for CBS.
weight=0.50
learn_duration=180
cluster_min_events=3
# Slightly relaxed SSIM threshold for the translucent CBS eye overlay.
logo_ssim_threshold=0.65
# Raise corner filter ratio so bottom-left (CBS eye corner) is not excluded.
# Default 1.5 would discard it; 3.0 keeps it while still filtering true noise.
logo_corner_filter_ratio=3.0
# Raise corner ticker threshold for cooking competition format (timers, ingredient
# overlays generate 0.54–0.64 events/s). Default 0.5 excludes all 4 corners and
# suppresses logo detection entirely. 0.80 lets these through while still blocking
# true news/weather crawls (typically 1.0+ events/s).
corner_ticker_threshold=0.80

[AspectRatio]
weight=0.05

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
