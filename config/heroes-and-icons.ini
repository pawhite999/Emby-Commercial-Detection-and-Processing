# CommDetect — Heroes & Icons (H&I) profile
#
# H&I airs classic action/adventure and Star Trek series. Space-heavy content
# (DS9, TNG, Voyager, etc.) makes every corner noisy or black, so the logo
# detector consistently produces a black reference frame and reports logo-absent
# throughout the entire show — useless and counterproductive.
#
# BF is the reliable primary signal for H&I. Black frame events appear cleanly
# at break boundaries even in space content. With logo disabled, the weight
# normalization fix ensures BF carries its full share:
#   BF normalized = 0.60 / (0.60 + 0.05 + 0.15 + 0.05) = 0.706 >> 0.38
# so a single BF cluster alone is sufficient to detect a break.

[Logo]
enabled=false

[BlackFrame]
# cluster_max_gap=220 (inherited from commdetect.ini) handles DS9-style breaks
# where within-break ad gaps can reach ~210s.
cluster_min_duration=30

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
