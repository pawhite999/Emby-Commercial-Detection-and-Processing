# ComProcess — Commercial Processing Configuration
# This file controls what happens AFTER commercials are detected.
# It governs cutting, chapter marking, and FFmpeg encoding behavior.
# Place this file alongside the commdetect executable, or specify with --process-config.
#
# Lines starting with # or ; are comments.

[General]
# Processing mode — what to do with detected commercials.
# Options:
#   skip     — Generate EDL/chapter files only. Player skips during playback.
#              Non-destructive. Original file is untouched. (Default)
#   chapter  — Embed chapter markers into the file. Player shows skip buttons.
#              Modifies the container but not the video/audio streams.
#   cut      — Remove commercial segments entirely and produce a new file.
#              Destructive but saves disk space. Original can optionally be kept.
#   both     — Both chapter-mark AND produce a cut version.
mode=cut

# When mode=cut or mode=both, what to do with the original recording.
# Options: keep, delete, move
# "keep"   — Leave the original file in place (safest).
# "delete" — Delete the original after successful processing.
# "move"   — Move the original to the archive directory below.
original_action=keep

# Directory to move originals to when original_action=move.
# Supports {date} placeholder: /mnt/archive/{date} → /mnt/archive/2025-01-15
original_archive_dir=/mnt/archive/originals

# Naming pattern for the processed output file.
# Supports placeholders:
#   {name}      — Original filename without extension
#   {ext}       — Original extension
#   {date}      — Current date (YYYY-MM-DD)
#   {mode}      — Processing mode (cut, chapter)
# Default produces: "Show Name.cut.mkv" or "Show Name.chapter.mkv"
output_name_pattern={name}.{mode}.{ext}

# Whether to overwrite existing output files.
overwrite_existing=false

[Container]
# Output container format for cut/chapter operations.
# Options: mkv, mp4, ts, original
# "original" preserves the source container format.
# "mkv" is recommended — it supports chapters, all codecs, and is widely compatible.
# "mp4" is more compatible with some devices but has codec limitations.
format=mkv

# When format is set (not "original"), whether to remux without re-encoding.
# Remuxing is very fast and lossless — it just repackages the streams.
# Only set to false if you need to re-encode (see [VideoEncode] section).
remux_only=true

[ChapterMarking]
# Settings for chapter mode (mode=chapter or mode=both).

# Label format for program chapters.
# Supports: {number} — chapter number, {time} — start time
program_chapter_label=Part {number}

# Label format for commercial chapters.
commercial_chapter_label=Commercial Break {number}

# Whether to mark commercial chapters as "hidden" in MKV.
# Hidden chapters are skipped by some players automatically.
hide_commercial_chapters=true

# Whether to set the default edition flag so players auto-skip.
set_default_edition=true

# Tool to use for embedding chapters.
# Options: ffmpeg, mkvmerge, auto
# "auto" uses mkvmerge for MKV files and ffmpeg for everything else.
# mkvmerge is preferred for MKV — it handles chapters more reliably.
chapter_tool=auto

[Cut]
# Settings for cut mode (mode=cut or mode=both).

# Method for removing commercials.
# Options:
#   concat    — Extract program segments and concatenate. Fast, may have
#               brief glitches at cut points. Best for transport streams.
#   reencode  — Re-encode around cut points for seamless transitions.
#               Slower but produces clean cuts. See [VideoEncode] for settings.
#   smart     — Re-encode only a few seconds around each cut point,
#               stream-copy everything else. Good balance of speed and quality.
cut_method=concat

# For "smart" method: seconds to re-encode around each cut point.
# 2-3 seconds is usually sufficient for clean keyframe alignment.
smart_reencode_margin=2.0

# Whether to insert a brief fade at cut points (makes transitions smoother).
fade_at_cuts=false

# Fade duration in seconds (if fade_at_cuts=true).
fade_duration=0.5

[VideoEncode]
# FFmpeg video encoding settings — used when cut_method=reencode or smart,
# or when remux_only=false.
#
# These settings ONLY apply to video that needs re-encoding.
# When remuxing or stream-copying, the original quality is preserved.

# Video codec. Common options: libx264, libx265, libsvtav1, copy
# "copy" = stream copy (no re-encoding, fastest, lossless).
codec=libx264

# Encoding preset (speed vs compression tradeoff).
# Options for x264/x265: ultrafast, superfast, veryfast, faster, fast,
#   medium, slow, slower, veryslow
# Faster presets = larger files but quicker encoding.
# "veryfast" is a good balance for DVR content.
preset=slower

# Constant Rate Factor — quality level (lower = better quality, larger file).
# Range: 0-51 for x264/x265. 18-23 is visually lossless for most content.
# 20 is a good default for DVR recordings.
crf=20

# Target resolution. Leave blank to preserve original resolution.
# Format: WIDTHxHEIGHT (e.g., 1920x1080, 1280x720)
# Useful if you want to downscale recordings to save space.
resolution=

# Pixel format. Usually leave as default.
# Options: yuv420p (most compatible), yuv422p, yuv444p
pixel_format=yuv420p

# Hardware acceleration for encoding (significantly faster on supported hardware).
# Options: none, nvenc, qsv, vaapi, videotoolbox, amf
# nvenc          — NVIDIA GPU (use h264_nvenc or hevc_nvenc codec)
# qsv            — Intel Quick Sync Video
# vaapi          — Linux VA-API (Intel/AMD)
# videotoolbox   — macOS hardware encoder
# amf            — AMD AMF encoder
# "none" uses CPU encoding (always available, most compatible).
hw_accel=none

# Deinterlace filter. Many DVR recordings are interlaced.
# Options: none, yadif, bwdif, auto
# "auto" detects interlaced content and applies bwdif when needed.
deinterlace=auto

# Additional FFmpeg video filters (comma-separated).
# Applied in order. Leave blank for none.
# Examples: "pp=hb/vb/dr/al", "hqdn3d=3:2:3:2" (light denoise)
extra_filters=

# Additional raw FFmpeg output arguments (advanced).
# Appended to the FFmpeg command. Use with care.
extra_args=

[AudioEncode]
# FFmpeg audio encoding settings.

# Audio codec. Options: copy, aac, libfdk_aac, ac3, eac3, libopus, flac
# "copy" preserves original audio, but cannot be used with smart/reencode cut methods.
# Use aac for MP4 output or when cut_method=smart/reencode.
codec=aac

# Audio bitrate (when re-encoding). Ignored when codec=copy.
# Examples: 128k, 192k, 256k, 320k
bitrate=192k

# Audio sample rate. Leave blank to preserve original.
# Common values: 44100, 48000
sample_rate=

# Number of audio channels. Leave blank to preserve original.
# Options: 1 (mono), 2 (stereo), 6 (5.1 surround)
channels=

# Whether to normalize audio levels.
# Useful if commercial audio is louder than program audio.
normalize=false

# Normalization target in LUFS (when normalize=true).
# -14 LUFS is the streaming standard. -16 to -18 is common for TV content.
normalize_target=-16

[SubtitleHandling]
# How to handle subtitles during processing.

# Whether to carry subtitles from the original into the output.
# Options: all, none, first, by_language
copy_subtitles=all

# Preferred subtitle languages (comma-separated ISO 639 codes).
# Only used when copy_subtitles=by_language.
# Example: eng,spa
preferred_languages=eng

# Whether to adjust subtitle timing after commercial cutting.
# Required for cut mode — subtitles must be re-timed to match the cut video.
adjust_timing=true

[Metadata]
# Metadata handling during processing.

# Whether to preserve original file metadata (title, show name, etc.).
copy_metadata=true

# Whether to add CommDetect processing metadata to the output file.
# Includes: processing date, commercial count, total time removed.
add_processing_info=true

# Custom metadata key=value pairs to add (one per line, key:value format).
# Example: processed_by:CommDetect 1.0
custom_metadata=

[Advanced]
# Advanced FFmpeg and processing settings.

# Path to ffmpeg binary. Leave blank for auto-detection (recommended).
ffmpeg_path=

# Path to ffprobe binary. Leave blank for auto-detection.
ffprobe_path=

# Path to mkvmerge binary (for MKV chapter operations).
# Leave blank for auto-detection. Install mkvtoolnix for best MKV support.
mkvmerge_path=

# Temporary directory for intermediate files during processing.
# Leave blank to use system temp directory.
temp_dir=

# Whether to keep temporary/intermediate files (useful for debugging).
keep_temp_files=false

# Maximum FFmpeg process priority.
# Options: normal, below_normal, idle
# "idle" ensures processing doesn't interfere with playback.
process_priority=below_normal

# FFmpeg log level: quiet, error, warning, info, verbose, debug
ffmpeg_log_level=error

# Maximum time in minutes to allow for processing a single file.
# 0 = no timeout.
processing_timeout_minutes=0
