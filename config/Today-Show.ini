# The Today Show (NBC) — Per-show detection override
# Use: commdetect process <file> --config Today-Show.ini
#
# NBC format: 3-hour morning show with frequent 2-4 min commercial breaks.
#
# KEY FINDING: Drug ads (and other "soft" ads) consistently escape detection.
# Root cause: drug ads have NO internal black frames, NO silence, and very few
# scene cuts — the only commercial signal is logo absence (NBC peacock disappears
# during all commercial breaks). Logo absence contributes 0.273 normalized
# (weights: Logo=0.30, total active=1.10). Raw drug-ad window score = 0.273,
# which is below the default threshold=0.38. The drug ad is therefore always
# classified as program, even though it is part of a commercial pod.
#
# Fix: lower commercial_threshold to 0.25 so that logo-only windows (0.273) cross
# it. Lower smoothing_radius to 2 so the pod-entry transition window (diluted by
# neighboring program windows) still crosses threshold (would fall to 0.228 with
# radius=3 even at threshold=0.25).
#
# Program content scores ~0.0 (NBC logo present → logo contribution = 0).
# There is a ~0.25 margin between program content and drug ads, which is enough
# to set a threshold safely.
#
# Normal commercial windows (BF + SC cluster + logo absent) score 0.55+, well
# above the reduced threshold.
#
# Risk: any program segment where the NBC bug is absent for ≥45s continuously
# (e.g. extended full-screen weather maps) could trigger a false cut. The 45s
# minimum duration and smoothing radius=2 provide some protection.
#
# Other fixes:
#   - min_commercial_seconds=45 : allow shorter detected segments (drug ads are
#                                  ~30s; reducing from 60s prevents pod fragmentation)
#   - max_commercial_seconds=240: caps individual segments before MergeGap runs.
#                                  MergeGap can combine adjacent segments so the
#                                  effective merged block may exceed this limit —
#                                  240s keeps individual detections honest while
#                                  still allowing real 3-4 min breaks to pass.
#   - commercial_merge_gap=60   : bridges sub-threshold ads (sponsored content,
#                                  drug ads, branded segments with logo visible)
#                                  that create false program islands within a pod.
#                                  Any program gap ≤60s between two detected
#                                  commercial segments is absorbed into one break.
#                                  NOTE: 90s was tried but caused over-merging —
#                                  Today Show has legitimate program segments as
#                                  short as 90–120s between commercial breaks, so
#                                  90s gap absorbed them into adjacent cuts, creating
#                                  18+ minute false commercial blocks.
#   - psip_enabled=false        : Emby/HDHomeRun recordings strip PSIP PIDs
#   - xds_enabled=true          : NBC broadcasts XDS; may provide skip boundaries
#                                  if XDS data is present in recording

[General]
frame_sample_rate=3.0

[Detection]
commercial_threshold=0.25
min_commercial_seconds=45
max_commercial_seconds=240
smoothing_radius=2
commercial_merge_gap=60

[BlackFrame]
weight=0.30

[SceneChange]
weight=0.20

[Silence]
weight=0.20

[Logo]
enabled=true
weight=0.30

[AspectRatio]
weight=0.10

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://192.168.1.34:8096
api_key=d5ba6899b4284c94a38717cb27320ee8


[Psip]
# Emby/HDHomeRun recordings only keep video+audio PIDs; PSIP is stripped.
enabled=false

[Xds]
# XDS is embedded in the video track and survives Emby recording.
# NBC broadcasts XDS program length — enables automatic skip_start/skip_end
# when the data is present in the recording.
enabled=true

[Output]
formats=edl

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
