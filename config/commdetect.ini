# CommDetect — Commercial Detection Configuration
# This file controls how commercials are detected in your recordings.
# Place this file alongside the commdetect executable, or specify with --config.
#
# Modeled after Comskip.ini for familiarity. All values shown are defaults.
# Lines starting with # or ; are comments.

[General]
# Detection preset: fast, default, accurate
# Fast uses fewer detectors and lower sample rates for quicker processing.
# Accurate enables all detectors at higher resolution.
preset=default

# Analysis window size in seconds. Smaller = more granular but slower.
window_size=2.0

# Video frame sample rate (frames per second to analyze).
# Higher = more accurate but slower. Range: 1-10. Sweet spot is 2-5.
frame_sample_rate=3.0

# Maximum parallel detector threads. 0 = auto (uses all CPU cores).
max_parallelism=0

[Detection]
# Overall threshold for classifying a window as commercial (0.0-1.0).
# Lower = more aggressive (catches more but may have false positives).
# Higher = more conservative (misses some but fewer false positives).
commercial_threshold=0.45

# Temporal smoothing radius (in analysis windows).
# Higher values reduce flickering between program/commercial but may
# blur boundaries. Range: 1-10.
smoothing_radius=3

# Minimum commercial break duration in seconds.
# Detected segments shorter than this are reclassified as program.
min_commercial_seconds=15

# Maximum commercial break duration in seconds.
# Detected segments longer than this are reclassified as program.
# Most commercial breaks are 2-5 minutes (120-300 seconds).
max_commercial_seconds=600

# Padding in seconds added before/after each detected break.
# Prevents cutting into the first/last moment of program content.
padding_seconds=0.5

[BlackFrame]
# Enable black frame detection (strongly recommended).
enabled=true

# Maximum average luminance for a frame to count as "black" (0-255).
# Increase if your source has slightly bright black frames.
luma_threshold=12

# Minimum consecutive black frames to count as a boundary marker.
min_count=2

# Weight of this signal in the final score (0.0-1.0).
# Higher = this detector has more influence on the final decision.
weight=0.40

[SceneChange]
# Enable scene change rate detection.
enabled=true

# Histogram difference threshold for a scene change (0.0-1.0).
# Lower = more sensitive to small changes.
threshold=0.35

# Scene changes per minute above this value suggest commercial content.
# Commercials typically have 15-30+ changes/minute vs 5-10 for programs.
rate_threshold=12.0

# Weight in final score.
weight=0.20

[Silence]
# Enable audio silence detection.
enabled=true

# RMS energy below this level is considered silence (0.0-1.0).
# Increase if your source has a noisy silence floor.
rms_threshold=0.01

# Minimum silence duration in seconds to be significant.
min_duration=0.2

# Weight in final score.
weight=0.15

[Logo]
# Enable network logo ("bug") detection.
# The detector learns the logo from the first N seconds of the recording,
# then flags segments where the logo disappears (likely commercials).
# More CPU-intensive than other detectors.
enabled=true

# Seconds of video to sample for logo template learning.
# Should be long enough to capture stable program content with the logo visible.
learn_duration=120

# Weight in final score.
weight=0.25

[AspectRatio]
# Enable aspect ratio change detection.
# Some channels switch between 16:9 (program) and 4:3 (older commercials).
enabled=true

# Weight in final score.
weight=0.10

[AudioFingerprint]
# Enable audio fingerprint-based repetition detection.
# Detects repeated audio (same commercial airing multiple times).
# Most CPU-intensive detector. Disabled by default for speed.
enabled=false

# Minimum repetitions of the same audio segment to flag as commercial.
min_repetitions=2

# Weight in final score.
weight=0.20

[Output]
# Output formats to generate (comma-separated).
# Options: edl, comskip_txt, mkv_chapters, json, ffmetadata
# edl          — Edit Decision List (Emby, Kodi, MPC-HC, mpv)
# comskip_txt  — Comskip-compatible frame-based markers (Plex, Jellyfin)
# mkv_chapters — MKV chapter XML for embedding in containers
# json         — Detailed JSON for custom integrations
# ffmetadata   — FFmpeg metadata chapter format
formats=edl

# Where to write output files.
# "alongside" = same directory as the input file (default, works with most players)
# Or specify an absolute path.
output_location=alongside

[Watch]
# Settings for watch mode (commdetect watch / commdetect emby watch).

# Seconds to wait after a file stops changing before processing.
# Prevents analyzing a file while the DVR is still recording.
# 30-60 seconds is usually safe for Emby.
stability_delay=30

# Minimum file size in MB to process. Filters out thumbnails and metadata files.
min_file_size_mb=50

# Skip files that already have output files (EDL, TXT, etc.) alongside them.
skip_already_processed=true

# Maximum concurrent analysis jobs.
# Set to 1 on low-powered NAS hardware to avoid system overload.
max_concurrent_jobs=1

# File extensions to monitor (comma-separated).
file_extensions=.ts,.mpg,.mpeg,.mp4,.mkv,.avi,.wtv,.m4v

# Glob patterns to exclude (comma-separated).
exclude_patterns=*.partial.*,*temp*,*.tmp

# Process existing unanalyzed files when watch mode starts.
process_existing_on_startup=false
