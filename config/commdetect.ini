# CommDetect — Commercial Detection Configuration
# This file controls how commercials are detected in your recordings.
# Place this file alongside the commdetect executable, or specify with --config.
#
# Modeled after Comskip.ini for familiarity. All values shown are defaults.
# Lines starting with # or ; are comments.

[General]
# Detection preset: fast, default, accurate
# Fast uses fewer detectors and lower sample rates for quicker processing.
# Accurate enables all detectors at higher resolution.
preset=default

# Analysis window size in seconds. Smaller = more granular but slower.
window_size=2.0

# Video frame sample rate (frames per second to analyze).
# Higher = more accurate but slower. Range: 1-10. Sweet spot is 2-5.
frame_sample_rate=3.0

# Maximum parallel detector threads. 0 = auto (uses all CPU cores).
max_parallelism=0

[Detection]
# Overall threshold for classifying a window as commercial (0.0-1.0).
# Lower = more aggressive (catches more but may have false positives).
# Higher = more conservative (misses some but fewer false positives).
commercial_threshold=0.38

# Temporal smoothing radius (in analysis windows).
# Higher values reduce flickering between program/commercial but may
# blur boundaries. Range: 1-10.
smoothing_radius=3

# Ignore commercial detections that start within the first N seconds of the recording.
# Useful for shows that begin with a station ID, opening credits, or cold open that
# trigger false positives. Set to 0 to disable (default).
skip_start_seconds=0

# Ignore commercial detections that end within the last N seconds of the recording.
# Useful when the show ends before the recording does and end-of-show content gets
# misclassified as commercial. Set to 0 to disable (default).
skip_end_seconds=0

# Minimum commercial break duration in seconds.
# Detected segments shorter than this are reclassified as program.
min_commercial_seconds=60

# Maximum commercial break duration in seconds.
# Detected segments longer than this are reclassified as program.
# Most commercial breaks are 2-5 minutes (120-300 seconds).
max_commercial_seconds=600

# Padding in seconds added before/after each detected break.
# Prevents cutting into the first/last moment of program content.
padding_seconds=0.5

[BlackFrame]
# Enable black frame detection (strongly recommended).
enabled=true

# Maximum average luminance for a frame to count as "black" (0-255).
# Increase if your source has slightly bright black frames.
luma_threshold=12

# Minimum consecutive black frames to count as a boundary marker.
# 1 = accept any detected black segment (default). Raise to 5 in per-network
# profiles where spurious sub-frame flashes need filtering (e.g. great-tv.ini).
min_count=1

# Weight of this signal in the final score (0.0-1.0).
# Higher = this detector has more influence on the final decision.
weight=0.60

# BF clustering: groups sparse BF events (break entry + exit) into a single
# pod-spanning segment that scores 1.0 throughout the break.
# cluster_max_gap: max seconds between BF events before starting a new cluster.
#   220s works for most networks where within-break ad gaps can reach 130–210s.
#   Program segments between breaks are typically 300s+, so adjacent breaks
#   stay separate even at this value.
#   NOTE: pillarboxing networks (Great TV, Story TV) only produce BF events at
#   break entry/exit — those need cluster_max_gap=350 in a per-network profile.
# cluster_min_duration: minimum seconds a cluster must span to be kept.
# cluster_min_events: minimum BF events needed to form a cluster (entry + exit = 2).
use_clustering=true
cluster_max_gap=220
cluster_min_duration=60
cluster_min_events=2

[SceneChange]
# Enable scene change rate detection.
enabled=true

# Histogram difference threshold for a scene change (0.0-1.0).
# Lower = more sensitive to small changes.
threshold=0.40

# Scene changes per minute above this value suggest commercial content.
# Commercials typically have 15-30+ changes/minute vs 5-10 for programs.
rate_threshold=12.0

# Weight in final score. Demoted: SC is noisy for dramas/sitcoms and provides
# little discrimination. Low weight prevents it adding false-positive noise.
weight=0.05

[Silence]
# Enable audio silence detection.
enabled=true

# RMS energy below this level is considered silence (0.0-1.0).
# Increase if your source has a noisy silence floor.
rms_threshold=0.01

# Minimum silence duration in seconds to be significant.
min_duration=0.3

# Weight in final score.
weight=0.15
[Logo]
# Enable network logo ("bug") detection.
# The detector learns the logo from the first N seconds of the recording,
# then flags segments where the logo disappears (likely commercials).
# More CPU-intensive than other detectors.
enabled=true

# Seconds of video to sample for logo template learning.
# Should be long enough to capture stable program content with the logo visible.
learn_duration=180
cluster_min_events=3

# Weight in final score. At 0.40, normalized logo = 0.40/1.25 = 0.32 — below the
# 0.38 threshold so logo alone cannot trigger detection. Combined with any other
# signal (BF, silence) it can, which allows it to catch breaks that BF alone misses
# (e.g. space-heavy content like Star Trek where BF is unreliable).
weight=0.40

# SSIM threshold for logo presence. Frames scoring below this are treated as
# logo-absent (commercial). Range 0.0–1.0; 0.75 is a good starting point.
# Higher = more sensitive (catches more logo changes); lower = stricter.
logo_ssim_threshold=0.70

# Corner noise filter ratio. Corners with a Phase 1 activity rate greater than
# (quietest corner rate × this value) are excluded from detection.
# 1.5 = keep corners within 50% of the most stable corner's rate.
# Set to 0 to disable filtering (use all active corners).
logo_corner_filter_ratio=1.5

[Letterbox]
# Enable letterbox detection for pillarboxed channels (Great TV, Story TV).
# Detects sustained darkness in the center-top strip of the frame, which only
# goes dark when the broadcaster adds letterbox bars during commercial breaks.
# Has no effect on non-pillarboxed content — the center-top strip of a normal
# 16:9 recording is never uniformly dark for 5+ seconds during program content.
# Enable in a per-network profile (e.g. great-tv.ini); leave disabled here.
enabled=false

# Weight in final score.
weight=0.50

# Minimum continuous darkness in seconds. 5s filters scene-cut flashes while
# catching all commercial breaks (typically ≥ 30s).
min_duration=5.0

# Fraction of strip pixels that must be below the brightness threshold (0–1).
# 0.85 = 85% of the sampled strip must be black.
pic_threshold=0.85

[AspectRatio]
# Enable aspect ratio change detection.
# Some channels switch between 16:9 (program) and 4:3 (older commercials).
enabled=true

# Weight in final score.
weight=0.05

[AudioFingerprint]
# Enable audio fingerprint-based repetition detection.
# Detects repeated audio (same commercial airing multiple times).
# Most CPU-intensive detector. Disabled by default for speed.
enabled=false

# Minimum repetitions of the same audio segment to flag as commercial.
min_repetitions=2

# Weight in final score.
weight=0.30

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=


[Psip]
# ATSC PSIP auto-detection — reads program boundaries directly from the TS stream.
# CommDetect scans the recording for STT (System Time Table) and EIT (Event Information
# Table) tables embedded by the broadcaster at record time. From these it derives the
# exact DVR pre/post-roll padding and automatically sets skip_start_seconds and
# skip_end_seconds — no Emby, no external EPG source, no time drift.
#
# Works with OTA recordings from HDHomeRun and similar ATSC tuners.
# Non-TS files (MKV, MP4, etc.) have no PSIP data; CommDetect falls back to the
# skip_start_seconds/skip_end_seconds values set in [Detection] above.
#
# Set to false to disable and rely on manually configured skip values instead.
enabled=true

[Xds]
# XDS (Extended Data Services / EIA-608) program boundary detection.
# Reads Class 1 (Current Program) packets embedded in the video track's closed-caption
# user data. Unlike PSIP, XDS survives Emby/HDHomeRun DVR recording because the full
# video track is preserved.
#
# XDS provides minute-precision program boundaries from the broadcast signal:
#   - Program length: total scheduled duration of the show
#   - Elapsed time: how many minutes into the program the recording started
#     (0 = recording started at show start; > 0 = recording started mid-show,
#      which should not happen normally but handles edge cases)
#
# XDS is used as a fallback when PSIP is unavailable (e.g. Emby recordings).
# Falls back to ini skip_start_seconds/skip_end_seconds if XDS data is absent.
#
# Note: not all broadcasters send XDS. CW, NBC, ABC, CBS generally do.
# Set to false to disable.
enabled=true

[Logging]
# Run-log and EDL archiving. When enabled, each invocation of "commdetect process"
# writes a copy of the full log output and the resulting EDL to the directories
# below, named by show and timestamp (e.g. Quincy_ME_S07E06_20260321_143000.log).
# Files older than retention_days are deleted automatically on the next run.
#
# Set enabled=true to activate. Directories are created automatically.
enabled=true
log_dir=/tmp/logs/log
edl_dir=/tmp/logs/edl
retention_days=3

# Primary video folder. analyze-edl.sh reads EDLs from here by default
# (alongside-video mode), so all batch-processed shows are always visible.
video_dir=/home/phil/Videos

[Output]
# Output formats to generate (comma-separated).
# Options: edl, comskip_txt, mkv_chapters, json, ffmetadata
# edl          — Edit Decision List (Emby, Kodi, MPC-HC, mpv)
# comskip_txt  — Comskip-compatible frame-based markers (Plex, Jellyfin)
# mkv_chapters — MKV chapter XML for embedding in containers
# json         — Detailed JSON for custom integrations
# ffmetadata   — FFmpeg metadata chapter format
formats=edl

# Where to write output files.
# "alongside" = same directory as the input file (default, works with most players)
# Or specify an absolute path.
output_location=alongside

[Watch]
# Settings for watch mode (commdetect watch / commdetect emby watch).

# Seconds to wait after a file stops changing before processing.
# Prevents analyzing a file while the DVR is still recording.
# 30-60 seconds is usually safe for Emby.
stability_delay=30

# Minimum file size in MB to process. Filters out thumbnails and metadata files.
min_file_size_mb=50

# Skip files that already have output files (EDL, TXT, etc.) alongside them.
skip_already_processed=true

# Maximum concurrent analysis jobs.
# Set to 1 on low-powered NAS hardware to avoid system overload.
max_concurrent_jobs=1

# File extensions to monitor (comma-separated).
file_extensions=.ts,.mpg,.mpeg,.mp4,.mkv,.avi,.wtv,.m4v

# Glob patterns to exclude (comma-separated).
exclude_patterns=*.partial.*,*temp*,*.tmp

# Process existing unanalyzed files when watch mode starts.
process_existing_on_startup=false
