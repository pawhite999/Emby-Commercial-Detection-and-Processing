# Saturday Night Live (NBC) — Per-show detection override
# Use: commdetect process <file> --config Saturday-Night-Live.ini
#
# NBC format: 90-minute live sketch show with 8-10 commercial breaks of 2-4 min each.
#
# KEY FINDINGS (S51E14 Ryan Gosling + S51E15 Harry Styles):
#
# BF clustering correctly identifies all 9 commercial breaks across tested
# episodes. BF is the primary signal. Inverted SC is a supporting signal only —
# at weight=0.20 it cannot reach threshold=0.55 without a BF cluster present,
# preventing false positives on quiet sketches and musical performances.
#
# Earlier tuning (SC_inverted=0.65, BF=0.15) caused all 5 detected segments
# in S51E14 to be false positives in program content between breaks, while
# all 9 actual breaks were missed. Root cause: inverted SC dominance — quiet
# program segments (slow sketches, Gorillaz performances) scored above threshold
# without any BF cluster. Fix: make BF primary.
#
# Known timing gap — late BF events on some breaks:
#   Break 1 of S51E14: BF cluster starts 2:01 into the break (Hail Mary
#   commercial missed). Break 6: BF starts 2:43 late. These are unavoidable
#   without a different detection approach for break entry.
#
# min_commercial_seconds=55: With BF as primary, sketch false positives score
#   ~0.30 and never reach threshold — so min duration no longer needs to protect
#   against them. 55s recovers real breaks whose BF clusters span 62–76s while
#   staying well above the 2–30s range of any spurious program BF hits.
# max_commercial_seconds=300: Rejects musical performances and long sketches
#   that might otherwise accumulate enough score to pass threshold.
#
# LOGO DETECTION — DISABLED (non-functional for this show):
#   S51E15 verbose analysis: all 4 corners have nearly identical activity rates
#   (top-left=0.30, top-right=0.30, bottom-left=0.24, bottom-right=0.31 eps).
#   All are within the 1.5× noise filter ratio, so all 4 are selected. SNL's
#   stage lighting, fullscreen effects, and fast camera cuts cause SSIM to hover
#   0.50–0.78 throughout the entire recording — uniformly below the 0.80
#   threshold in both program content and commercial breaks. The union of all 4
#   corners produces one contiguous logo-absent block: 0s → 6060s (full
#   recording). Logo contributes only noise, not signal. Disabled entirely.
#   (Previous attempt: logo_ssim_threshold=0.80 did not help — the SSIM values
#   are too uniform across program vs. commercial to use any threshold.)
#
# Known limitation — first 4–5s of cold open cut:
#   The pre-show NBC content ends at ~110s; detection extends to 114s, cutting
#   ~4s of the cold open. Without EPG data (PSIP and XDS both fail for this
#   recording) there is no way to set an exact boundary automatically. To
#   preserve the pre-show instead, set skip_start_seconds=115 — but that will
#   also leave ~2 min of pre-show NBC content in the output. Leave at 0 to
#   keep current behavior (pre-show cut, 4s of cold open also cut).
#
# PSIP/XDS: Both fail for Emby/HDHomeRun recordings of this channel.
#   PSIP PIDs are stripped; XDS data not present in this recording.

[General]
frame_sample_rate=3.0

[Detection]
commercial_threshold=0.55
min_commercial_seconds=55
max_commercial_seconds=300
smoothing_radius=3

[BlackFrame]
# BF clustering is the primary signal — it correctly identifies all 9 breaks
# across tested episodes. BF alone at 0.55 clears threshold=0.55 (~0.79 score).
weight=0.55

[SceneChange]
# Inverted SC demoted to supporting role. At 0.20, inverted SC alone on a
# quiet program segment maxes out at ~0.30 — cannot reach threshold without BF.
# Keeps providing a useful boost to BF-covered breaks without causing false
# positives on slow sketches or musical performances.
weight=0.20
scene_change_invert=true

[Silence]
weight=0.15

[Logo]
enabled=false

[AspectRatio]
weight=0.05

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=

[Psip]
# Emby/HDHomeRun recordings only keep video+audio PIDs; PSIP is stripped.
enabled=false

[Xds]
# XDS data not found in this recording. Keep enabled as a no-cost fallback
# in case a future recording includes it.
enabled=true

[Output]
formats=edl
