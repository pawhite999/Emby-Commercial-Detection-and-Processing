# Penn & Teller: Fool Us — Per-show detection override
# Use: commdetect process <file> --config Penn-and-Teller-Fool-Us.ini
#
# CW format: ~42 min show with 3-4 commercial breaks of 2-4 min each.
# Problem: rapid-cut magic acts (pigeon reveals, close-ups, audience reactions)
# generate high scene-change scores and get misclassified as commercials.
#
# Fixes applied vs. commdetect.ini:
#   - skip_start_seconds=400   : opening sequence + first act look like commercials
#   - max_commercial_seconds=300: rejects false positives > 5 min (magic acts)
#   - scene_change_weight=0.15 : reduce influence of cuts during magic acts
#   - black_frame_weight=0.35  : real CW breaks reliably have black-frame boundaries
#   - silence_weight=0.20      : unchanged (real breaks have silence at boundaries)
#   - logo enabled             : CW bug disappears during breaks; presence during acts
#                                should vote against commercial classification
#   - corner_ticker_threshold=0.65: CW corner activity sits just above the default 0.50
#                                cutoff; raising to 0.65 keeps the two quietest corners
#                                (~0.51, ~0.53 events/s) as active logo corners

[General]
frame_sample_rate=3.0

[Detection]
commercial_threshold=0.38
skip_start_seconds=400
min_commercial_seconds=60
max_commercial_seconds=300

[BlackFrame]
weight=0.30

[SceneChange]
threshold=0.40
weight=0.15

[Silence]
weight=0.20

[Logo]
enabled=true
weight=0.25
logo_ssim_threshold=0.70
logo_corner_filter_ratio=1.5
corner_ticker_threshold=0.65

[AspectRatio]
weight=0.10

[Output]
formats=edl
