# Penn & Teller: Fool Us — Per-show detection override
# Use: commdetect process <file> --config Penn-and-Teller-Fool-Us.ini
#
# CW format: ~42 min show with 3-4 commercial breaks of 2-4 min each.
#
# KEY FINDING (S09E08 verbose analysis): The CW logo bug STAYS ON during commercial
# breaks for this show. It drops out during reveal/discussion segments (when full-screen
# "FOOLED!" graphics or dramatic staging obscure the corners). Logo detection is therefore
# inverted — it was cutting discussion segments instead of commercials. Logo disabled.
#
# Commercial breaks ARE reliably marked by black frames throughout the pod at ~15s
# intervals (individual commercial boundaries). Discussion segments have no black frames.
# Black frame weight is increased to compensate for the removed logo weight.
#
# Fixes applied vs. commdetect.ini:
#   - skip_start_seconds=400   : opening sequence + first act look like commercials
#   - max_commercial_seconds=300: rejects false positives > 5 min (magic acts)
#   - scene_change_weight=0.15 : reduce influence of cuts during magic acts/discussions
#   - black_frame_weight=0.50  : primary signal — commercial pods have BF every ~15s;
#                                discussion segments have none
#   - bf use_clustering=true   : clusters dense BF events into pod-spanning segments.
#                                Without this, isolated BF windows (2s each) score only
#                                ~0.21 after smoothing — never reaching threshold=0.35.
#                                With clustering, the full pod scores BF=1.0 throughout.
#   - cluster_max_gap=35       : raised from 20. The missing break at ~36:34 (S09E08)
#                                has internal gaps of ~30s between BF events, which
#                                exceeded gap=20 and shattered the region into sub-groups
#                                too small to survive min_events=4 + min_duration=60.
#                                gap=35 bridges the 30s gaps; the 45s mid-break gap
#                                still splits into two sub-clusters, bridged by MergeGap.
#   - commercial_merge_gap=60  : bridges the ~45s split within break 3 (two sub-clusters
#                                from the same pod merged into one 241s break). 60s is
#                                safe here — program segments between breaks are 5-10 min.
#   - silence_weight=0.25      : slightly increased to help at commercial boundaries
#   - logo disabled            : CW keeps bug during commercials; drops during reveals.
#                                Logo was actively causing false cuts.
#   - psip_enabled=false       : Emby/HDHomeRun recordings strip PSIP PIDs; reader
#                                finds nothing and wastes scan time

[General]
frame_sample_rate=3.0

[Detection]
commercial_threshold=0.35
skip_start_seconds=400
min_commercial_seconds=45
max_commercial_seconds=300
smoothing_radius=5
commercial_merge_gap=60

[BlackFrame]
weight=0.50
# Commercial pods have a BF every ~15s (one per ad boundary within the pod).
# use_clustering groups these into a pod-spanning cluster that scores 1.0
# throughout, rather than isolated 2s windows diluted to ~0.21 by smoothing.
use_clustering=true
cluster_max_gap=35
cluster_min_duration=60
cluster_min_events=4

[SceneChange]
threshold=0.40
weight=0.15

[Silence]
weight=0.25

[Logo]
enabled=false

[AspectRatio]
weight=0.10

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=


[Psip]
# Emby/HDHomeRun recordings only keep video+audio PIDs; PSIP is stripped.
enabled=false

[Xds]
# XDS is embedded in the video track and survives Emby recording.
# CW broadcasts XDS program length + elapsed time, which CommDetect uses to
# automatically derive skip_start_seconds and skip_end_seconds.
# When XDS succeeds, the manually configured skip_start_seconds=400 above
# is overridden with the broadcast-derived value (minute precision).
enabled=true

[Output]
formats=edl
