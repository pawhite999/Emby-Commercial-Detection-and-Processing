# CommDetect — MeTV profile
#
# For MeTV network recordings where:
#   - A small network logo appears in the lower-right corner during program
#     content and disappears during commercial breaks.
#   - Mild pillarboxing (4:3 content in 16:9 frame with side bars) — logo
#     sits inside the active picture, not in the pillarbox bars.
#   - Commercial breaks are typically 2–4 minutes (120–240s).
#   - BF events are present at break boundaries but within-break ad gaps can
#     exceed 120s, making BF clustering unreliable alone.
#
# Logo detection is the primary signal. BF and silence provide support.

[BlackFrame]
# Weight raised to 0.25 so that BF alone clears the 0.38 commercial_threshold when
# logo detection is suppressed (e.g. older B&W shows where corner SSIM is unreliable).
# Normalized BF = 0.25 / (0.25+0.10+0.20) = 0.45 when logo is absent.
# When logo IS active, normalized BF = 0.25 / 1.05 = 0.24 — still logo-dominated.
weight=0.25
use_clustering=true
# 200s captures within-break BF gaps while staying under the ~350s+ program
# segments separating breaks.
cluster_max_gap=200
cluster_min_duration=30
cluster_min_events=2

[Detection]
# MeTV recordings often include post-show content that can trigger a false positive
# at the end of the recording. The classifier now trims (rather than discards) any
# commercial segment whose end falls inside the skip zone, so 60s is sufficient:
# a short tail stub will be filtered by min_commercial_seconds.
skip_end_seconds=60

[SceneChange]
weight=0.10

[Silence]
weight=0.20

[Logo]
enabled=true
# Logo is the primary detection signal for MeTV. Weight is set to 0.30 rather than
# a higher value to ensure logo alone (normalized ~0.33) stays below the 0.38
# commercial_threshold — requiring at least one corroborating signal (BF, silence).
# This prevents noisy logo signals (semi-transparent logos, inconsistent appearance)
# from triggering false detections on their own.
weight=0.30
learn_duration=180
cluster_min_events=3
logo_ssim_threshold=0.65
# Raise corner filter ratio to keep the logo corner even if slightly noisier
# than the others (mild pillarboxing can create some corner activity).
logo_corner_filter_ratio=3.0

[AspectRatio]
weight=0.05

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
