# CommDetect — The Late Show with Stephen Colbert (CBS) profile
#
# Colbert-specific issues vs. generic cbs.ini:
#   - Opening animated credits run 0:55–~1:55. With learn_duration=180 the
#     reference frame is extracted at 90s (35s into actual show content) —
#     right in the animated opening. The learned template is wrong, causing
#     bottom-left (CBS eye corner) to score backwards during the show.
#     Fix: learn_duration=360 shifts the reference frame to 180s = ~2:45 into
#     the show, well into stable monologue content.
#   - All 4 corners have similar Phase 1 activity rates (0.32–0.42 events/s)
#     due to the animated opening inflating all corners. logo_corner_filter_ratio
#     back to default 1.5 (tighter than cbs.ini's 3.0).
#   - Commercial break structure: break 1 is ~93s (fully BF-detectable).
#     Breaks 2+ are ~274s. BF events appear only in the last ~60s of each
#     long break. Logo detection (CBS eye absent during full break) is needed
#     to catch the first ~210s.
#
# NOTE: After running, check /tmp/commdetect_ref_bottom_left_*.png to confirm
# the reference frame captured the CBS eye correctly before trusting results.

[Detection]
# Skip CBS ident at recording start — produces a spurious BF cluster at ~32-82s.
skip_start_seconds=90
# Bridge the 2s BF anchor at the start of breaks 3 and 4 to the main BF cluster.
# Gaps: break 3 = 183s, break 4 = 212s. 215s bridges both without merging real breaks
# (smallest inter-break gap is 344s — break 1 end to break 2 start).
commercial_merge_gap=215
# Smoothing dilutes the 2s anchor BF clusters below threshold before merge_gap can run.
# BF clustering already produces clean boundaries — smoothing is not needed here.
smoothing_radius=0
# Raise threshold above the max SC+Silence+AR non-BF score (0.421) so that program
# content windows with scene cuts + audio pauses don't trigger false positives.
# BF alone scores 0.579 normalized, which comfortably clears this threshold.
commercial_threshold=0.45

[BlackFrame]
# BF is the primary reliable signal. Fully detects breaks 1, 2, 5.
# Breaks 3 and 4 have a lone 2s BF event at the break start, then a 180-210s gap
# before the next BF cluster. cluster_min_events=1 and cluster_min_duration=1 allow
# that 2s event to form its own cluster; commercial_merge_gap then bridges it.
weight=0.55
use_clustering=true
cluster_max_gap=180
cluster_min_duration=1
cluster_min_events=1

[SceneChange]
# Commercials have more cuts than the monologue — SC provides supporting signal.
weight=0.15

[Silence]
# Audio cut at break entry provides a break-start signal.
weight=0.20

[Logo]
# Disabled: the translucent CBS eye is too small relative to the crop area and
# the changing studio background makes SSIM unreliable — constant false positives
# throughout program content regardless of crop size.
enabled=false
weight=0.00

[AspectRatio]
weight=0.05

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
