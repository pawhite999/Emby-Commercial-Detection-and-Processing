# Grey's Anatomy (ABC) -- Per-show detection override
# Use: commdetect process <file> --config Greys-Anatomy.ini
#
# ABC format: ~44 min drama in a ~60 min recording.
# S22E13: 5 commercial breaks, all ~180-240s. First break starts at 400s (6:40).
#
# LOGO DETECTION -- DISABLED (non-functional for this show):
#   Grey's Anatomy has medical lower-thirds, hospital graphics, and surgical
#   overlays in all four corners throughout program content. During the learning
#   window (720-900s, actual program content), all four corners score 0.23-0.57
#   events/s -- too noisy for any corner to produce a reliable SSIM signal.
#
#   The ABC circle bug most likely lives in the bottom-right corner (0.57
#   events/s), but that high activity triggers the ticker exclusion threshold.
#   The paradox: the high rate is caused by the logo switching on/off at
#   commercial breaks -- exactly the signal we want -- but the noise filter
#   can't distinguish "logo switching at breaks" from a ticker scroll.
#
#   Top-left (0.23 events/s, selected by the filter) produces SSIM 0.509-0.700
#   uniformly throughout the recording with no separation between program and
#   commercial. Even at the reference frame's own timestamp (810s) it scores
#   0.684, confirming the corner is useless.
#
# PRIMARY SIGNAL -- Black Frame clustering:
#   Only 18 BF events in 60 min, but they land precisely at break boundaries:
#     398/596s  = break 1 entry/exit
#     954/1147/1152s = break 2
#     1492/1620/1725s = break 3
#     2065/2192/2283s = break 4
#     2907s = break 5 exit only (no entry BF -- weather ticker at 2727s
#             prevented a clean black frame; break 5 is missed)
#
#   cluster_max_gap=200: bridges the 90-192s gap between entry and exit BF
#   within a single break. Keeps adjacent breaks separate: the shortest
#   program segment between breaks is ~340s > 200s.
#   cluster_min_events=2: only need entry + exit BF (sometimes 3 events).
#   BF weight=0.70: with logo off, BF must be the primary signal. Normalized
#   BF contribution = 0.70/1.05 = 0.667, safely above threshold=0.38.
#
# SCENE CHANGE -- weight reduced to 0.05:
#   961 cuts across 60 min. SC is continuous through program AND commercial --
#   useless as a discriminator. Small weight prevents it adding noise.
#
# SKIP_START -- lowered from 480 to 350:
#   Break 1 starts at 400s. skip_start=480 was excluding it (breaks that start
#   before skip_start are discarded). Lowered to 350 so break 1 is detected.
#   Pre-show content (0-400s) has no BF events so no false clusters form.
#
# BREAK 5 -- missed:
#   Break 5 (2727-2908s) has a weather advisory ticker starting just before it.
#   No entry BF at 2727s; only exit BF at 2907s. Single-event BF cannot form
#   a cluster. This break cannot be detected with current architecture.

[General]
frame_sample_rate=3.0

[Detection]
commercial_threshold=0.38
skip_start_seconds=350
min_commercial_seconds=60
max_commercial_seconds=360
smoothing_radius=3

[BlackFrame]
weight=0.70
# BF events mark break entry and exit precisely. use_clustering groups the
# entry+exit pair into a pod-spanning segment that scores 1.0 throughout.
# cluster_max_gap=200 bridges the gap between entry BF and exit BF within a
# break (~90-192s). Program segments between breaks are ~340s, so adjacent
# breaks stay separate.
use_clustering=true
cluster_max_gap=200
cluster_min_duration=60
cluster_min_events=2

[SceneChange]
weight=0.05

[Silence]
weight=0.20

[Logo]
enabled=false

[AspectRatio]
weight=0.10

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=

[Psip]
# Emby/HDHomeRun recordings only keep video+audio PIDs; PSIP is stripped.
enabled=false

[Xds]
# XDS embedded in video track; survives Emby recording. May provide automatic
# skip_start/skip_end if ABC broadcasts XDS program timing data.
enabled=true

[Output]
formats=edl
