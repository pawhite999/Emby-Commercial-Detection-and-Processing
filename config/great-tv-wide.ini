# CommDetect — Great TV widescreen (16:9) profile
#
# For shows like Monk and Psych that Great TV broadcasts in widescreen
# letterbox format: 16:9 content inside a 4:3 frame with black bars
# at top and bottom throughout the program.
#
# great-tv.ini (for 4:3 pillarboxed content like Doc, Quincy, Rockford)
# does NOT work here because the LetterboxDetector sees the top black
# bar as continuous darkness throughout the entire show, flooding the
# classifier and producing 0 commercial segments.
#
# This profile disables the letterbox detector and relies on logo absence
# (Great TV logo is visible in the lower-right corner during program
# content) plus BF and silence as backup signals.
# BF uses commdetect.ini defaults (cluster_max_gap=220) — no need for
# the 350s override that great-tv.ini uses for pillarboxed entry/exit events.

[Letterbox]
enabled=false

[Emby]
# Emby Server API integration for EPG-based show boundary detection.
# When configured, CommDetect queries Emby for the recording's pre/post padding
# and automatically sets skip_start_seconds and skip_end_seconds — no manual
# per-show tuning needed.
#
# server_url: Your Emby server address (e.g. http://192.168.1.87:8096)
# api_key:    An API key from Emby Dashboard → Advanced → API Keys
#
# Leave both blank to disable (default).
server_url=http://
api_key=
